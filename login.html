<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeBuy Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div id="bg-animation"></div>

<div class="login-container">
   
    <div class="login-box">
        
        <h2>Login</h2>
    <form id="loginForm">
        <input name="email" class="field"  type="text" placeholder="Email or Mobile number">
        <input name="password" class="field" type="password" placeholder="Password">
        <input name="confirmPassword" id="confirm" class="field" type="password" placeholder="Re-type Password">
    </form>    
    <a href="mebuy.html">
        <button>Login</button>
    </a>
         <div class="logo">
        <img src="mebuy.png">
    </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
VANTA.FOG({
  el: "#bg-animation",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,

  highlightColor: 0x00ff9f,  // green glow
  midtoneColor: 0x00d4ff,    // blue
  lowlightColor: 0x0b0f2a,   // dark
  baseColor: 0x0b0f2a,       // background

  blurFactor: 0.6,
  speed: 1.2,
  zoom: 1.0
});
</script>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script src=" https://cdn.jsdelivr.net/npm/jquery-validation@1.22.1/dist/jquery.validate.min.js "></script>
<script src="script.js">

</script> 
<script src="script.js">

    var password=$("#loginForm input[name='password']").val()
    var confirmPassword=$(this).val()
    
  })  


</script> 

</body>
</html>
