<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script>
VANTA.FOG({
  el: "#bg-animation",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,

  highlightColor: 0x00ff9f,  // green glow
  midtoneColor: 0x00d4ff,    // blue
  lowlightColor: 0x0b0f2a,   // dark
  baseColor: 0x0b0f2a,       // background

  blurFactor: 0.6,
  speed: 1.2,
  zoom: 1.0
});
</script>

</body>
