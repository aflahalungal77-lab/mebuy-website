<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeBuy Main Page</title>

    <link rel="stylesheet" href="mebuy.css">
<style>
body {
  margin: 0;
  overflow: hidden;
}

#bg {
  width: 100%;
  height: 100vh;
}
</style>
</head>
  <body>
    <div class="bg-animation">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>
  <div id="bg"></div>

<div class="content">
  
</div>
   


 <div class="top-bar">

    <div class="logo">
        <img src="mebuy.png">
    </div>

    <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search shoes...">
    <span class="icon" onclick="searchProduct()">🔍︎</span>
</div>
    <div class="login">
        <a href="index.html">
            <button>Log Out</button>
        </a>
    </div>

</div>


    <div class="container">
     
   
        
        <div class="card" onclick="openProduct('Puma Mens Pulse Pro Generative Cyclone Running Shoe', 'puma1.jpg', '₹6,999')">
            <h2>PUMA</h2>
            <img class="pma" src="puma1.jpg" alt="puma shoe" onclick="window.location.href='product.html'">
            <p>Puma Mens Pulse Pro Generative Cyclone Running Shoe</p>
            
            
        </div>
        <div class="card" onclick="openProduct('Nike Mens Winflo 11', 'nike3.jpg', '₹6,956')">
            <h2>NIKE</h2>
            <img  class="nike" src="nike3.jpg"alt="nike shoe" onclick="window.location.href='product.html'">
            <p>Nike Mens Winflo 11 Running Shoes</p>
            
           
            

        </div>            
        <div class="card" onclick="openProduct('Adidas Mens Torite 2 M', 'adida.jpg', '₹5,999')">
            <h2>ADIDAS</h2>
            <img class="ad" src="adida.jpg" alt="adidas shoe" onclick="window.location.href='product.html'">
            <p>Adidas Mens Torite 2 M Running Shoes</p>
        </div>
         <div class="card" onclick="openProduct('HOGENT Toe Shoes for Men', 'new.jpg', '₹4,999')">
            <h2>HOGENT</h2>
            <img class="hogent" src="new.jpg"alt="hogent shoe" onclick="window.location.href='product.html'">
            <p><strong> Toe Shoes for Men Work Shoes Men </strong></p>
    
        </div>
        
    </div>
    
<script>
function searchProduct(){
    let input = document.getElementById("searchInput").value.toLowerCase();

    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();

        if(text.includes(input)){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>
<script>
function openProduct(name, image, price) {
  localStorage.setItem("name", name);
  localStorage.setItem("image", image);
  localStorage.setItem("price", price);

  window.location.href = "product.html";
}
</script>
<!-- REQUIRED SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>

<script>
VANTA.BIRDS({
  el: "#bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,

  backgroundColor: 0x081c2c,
  color1: 0x00ff88,
  color2: 0x00d4ff,

  birdSize: 1.5,
  wingSpan: 30,
  speedLimit: 6,

  separation: 40,
  alignment: 40,
  cohesion: 40,

  quantity: 4
});
</script>

  
    
</body>
</html>
