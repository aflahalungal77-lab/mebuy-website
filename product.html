<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeBuy Product's Detailed Page</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <div id="bg-animation"></div>

    <div class="cart">
        <a href="cart.html">
            <button>🛒</button>
        </a>
    </div>
    <div class="logo">
        <img src="mebuy.png">
    </div>
    <h2 id="pname"></h2>
<img id="pimage" width:"604px" height: "568px" >
<img id="pimage" width="700px">
<h3 id="pprice"></h3>
<p><strong>4.4 ★★★★⯪ (148)</strong></p>


<button style="background: gold;
  border-radius: 25px;
  height: 37px;
  width: 294px;
  font-weight: bold;">Add to Cart</button>

<a href="buynow.html">

<button style="background:linear-gradient(135deg, #00d4ff, #00ff88);
  border-radius: 25px;
  height: 37px;
  width: 294px;
  font-weight: bold;
  color: white;" >Buy Now</button>
  </a>

<script>
document.getElementById("pname").innerText = localStorage.getItem("name");
document.getElementById("pimage").src = localStorage.getItem("image");
document.getElementById("pprice").innerText = localStorage.getItem("price");
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
VANTA.FOG({
  el: "#bg-animation",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,

  highlightColor: 0x00ff9f,  // green glow
  midtoneColor: 0x00d4ff,    // blue
  lowlightColor: 0x0b0f2a,   // dark
  baseColor: 0x0b0f2a,       // background

  blurFactor: 0.6,
  speed: 1.2,
  zoom: 1.0
});
</script>
</body>
</html>
